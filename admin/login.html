<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Lali García Almeyda</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0efec;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff;
      padding: 48px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    }
    .logo {
      font-size: 0.65rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 6px;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      color: #1c1c1c;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 6px;
    }
    input[type=password] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      font-size: 1rem;
      color: #1c1c1c;
      outline: none;
      margin-bottom: 20px;
    }
    input[type=password]:focus { border-color: #1c1c1c; }
    button {
      width: 100%;
      padding: 12px;
      background: #1c1c1c;
      color: #fff;
      border: none;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button:hover { background: #333; }
    .error {
      display: none;
      background: #fdf0f0;
      border: 1px solid #f0c0c0;
      color: #c0392b;
      padding: 10px 12px;
      font-size: 0.85rem;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <div class="card">
    <p class="logo">Panel de edición</p>
    <h1>Lali García Almeyda</h1>
    <div class="error" id="error-msg">Contraseña incorrecta. Intentá de nuevo.</div>
    <form method="POST" action="/admin/login">
      <label for="password">Contraseña</label>
      <input type="password" id="password" name="password" autofocus autocomplete="current-password">
      <button type="submit">Entrar</button>
    </form>
  </div>
  <script>
    if (new URLSearchParams(location.search).get('error')) {
      document.getElementById('error-msg').style.display = 'block';
    }
  </script>
</body>
</html>
